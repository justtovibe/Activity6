<!DOCTYPE html>

    <body>
         <div class="about"></div>

            <section class="booking-form" id="booking">
        <h2>Book Your Stay</h2>
            <form action="#" method="POST" id="bookingForm">
                
                <div class="form-group">
                    <label for="checkin">Check In Date:</label>
                    <input type="date" id="checkin" name="checkin" required>
                </div>
                
                <div class="form-group">
                    <label for="checkout">Check Out Date:</label>
                    <input type="date" id="checkout" name="checkout" required>
                </div>
                
                <div class="form-group">
                    <label for="roomType">Room Type:</label>
                    <select id="roomType" name="roomType" required>
                        <option value="">Select a room type</option>
                        <option value="barkada">Barkada Room 1 (10 people)</option>
                        <option value="family">Barkada Room 2 (6 people)</option>
                        <option value="family2">Barkada Room 3 (5 people)</option>
                        <option value="barkada">Family Room 1 (10 people)</option>
                        <option value="family">Family Room 2 (6 people)</option>
                        <option value="family2">Family Room 3 (5 people)</option>
            </select>
                </div>
                
                <div class="form-group">
                    <label for="guests">Number of Guests:</label>
                    <input type="number" id="guests" name="guests" min="1" required>
                </div>
                
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <a href="rooms.html"></a>
                <button type="submit" class="submit-btn">Check Availability</button>
                
        </form>
    </section>
